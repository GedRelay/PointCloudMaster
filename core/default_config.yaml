scene_config:
    datasets_yaml: datasets/datasets.yaml
    dataset: carla4d
    scene_id: 0
    # 注意：如果你修改了数据集的加载代码或数据，建议删除缓存文件夹中的对应缓存文件以避免加载过期的缓存数据
    save_cache: true  # 是否保存缓存数据到本地
    use_cache: true  # 是否使用本地缓存数据，如果为true且缓存文件存在则直接加载缓存文件，跳过数据拉取和加载流程
    cache_path: cache/scene_cache  # 缓存数据的保存路径

visualizer_config:
    window_name: PCM
    window_height: 540
    window_width: 960
    window_left: 50  # 窗口生成时的左边距
    window_top: 50  # 窗口生成时的上边距
    
    background_color: [1.0, 1.0, 1.0]  # 背景RGB颜色，单值范围为[0,1]
    first_window:
        form: point  # 绘制形式, point表示点云, voxel表示体素化, octree表示八叉树
        point_size: 2.0  # 点大小
        voxel_size: 0.5  # 体素大小
        octree_max_depth: 8  # 八叉树最大深度
    second_window:
        form: point  # 绘制形式, point表示点云, voxel表示体素化, octree表示八叉树
        point_size: 2.0  # 点大小
        voxel_size: 0.5  # 体素大小
        octree_max_depth: 8  # 八叉树最大深度
    
    camera_sync: true  # 双窗口时是否相机同步, true表示同步, false表示不同步
    axis: 5  # 坐标轴大小, 0表示不绘制坐标轴
    # 初始相机参数设置，先按照原始坐标系方向进行相机平移，然后再按照rpy进行视角旋转，注意如果init_camera_T为null则init_camera_rpy也不生效，反之亦然，如果都不为null则同时设置初始相机位置和姿态
    init_camera_rpy: null  # 初始相机姿态, [roll, pitch, yaw]，单位为度，如果为null则不设置，roll、pitch、yaw分别表示绕x、y、z轴的旋转，正值表示逆时针旋转
    init_camera_T: null  # 初始相机位置, [x, y, z]，单位为米，如果为null则不设置
